<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas search Rss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .search-container {
            background: white;
            border-radius: 50px;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .search-container:focus-within {
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .search-icon {
            width: 24px;
            height: 24px;
            color: #667eea;
            margin-left: 15px;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.1rem;
            padding: 15px 10px;
            font-family: 'Inter', sans-serif;
            color: #333;
        }

        .search-input::placeholder {
            color: #999;
        }

        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        .results-container {
            margin-top: 40px;
            width: 100%;
            max-height: 500px;
            overflow-y: auto;
        }

        .result-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: left;
            animation: slideIn 0.3s ease;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .result-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            text-decoration: none;
            display: block;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-description {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .result-date {
            font-size: 0.85rem;
            color: #999;
            font-weight: 500;
        }

        .result-source {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .loading {
            display: none;
            margin-top: 30px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .no-results {
            display: none;
            color: white;
            font-size: 1.2rem;
            margin-top: 30px;
            text-align: center;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 2.5rem;
            }

            .search-container {
                flex-direction: column;
                border-radius: 20px;
                padding: 15px;
            }

            .search-input {
                width: 100%;
                text-align: center;
            }

            .search-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">Lucas search Rss</h1>
        <p class="subtitle">Pesquise em múltiplas fontes RSS</p>

        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Digite sua pesquisa...">
            <button class="search-btn" id="searchBtn">Pesquisar</button>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
        </div>

        <div class="no-results" id="noResults">
            Nenhum resultado encontrado
        </div>

        <div class="results-container" id="resultsContainer"></div>
    </div>

    <script>
        // Fontes RSS configuradas
        const rssSources = [
            { name: 'Tech News', url: 'https://lucasok3555.github.io/lucassearchrss/links.xml' },
            { name: 'Ciência', url: 'https://lucasok3555.github.io/lucassearchrss/links2.xml' },
            { name: 'Notícias', url: 'https://lucasok3555.github.io/lucassearchrss/links3.xml' },
            { name: 'Economia', url: 'https://lucasok3555.github.io/lucassearchrss/links4.xml' }
            { name: 'Economia', url: 'https://lucasok3555.github.io/lucassearchrss/links5.xml' }
            { name: 'Economia', url: 'https://lucasok3555.github.io/lucassearchrss/links6.xml' }
            { name: 'Economia', url: 'https://lucasok3555.github.io/lucassearchrss/links7.xml' }
            { name: 'Economia', url: 'https://lucasok3555.github.io/lucassearchrss/links8.xml' }
            { name: 'Economia', url: 'https://lucasok3555.github.io/lucassearchrss/links9.xml' }
            { name: 'Economia', url: 'https://lucasok3555.github.io/lucassearchrss/links10.xml' }
            { name: 'Economia', url: 'https://lucasok3555.github.io/lucassearchrss/links11.xml' }
        ];

        // Dados mockados para demonstração (devido a CORS)
        const mockResults = [
            {
                title: 'Nova tecnologia revoluciona o mercado',
                description: 'Descubra como as últimas inovações estão transformando a indústria de tecnologia...',
                date: '2024-01-15',
                source: 'Tech News',
                link: '#'
            },
            {
                title: 'Avanços na ciência médica',
                description: 'Pesquisadores anunciam descoberta importante no tratamento de doenças...',
                date: '2024-01-14',
                source: 'Ciência',
                link: '#'
            },
            {
                title: 'Mercado financeiro em alta',
                description: 'Bolsa de valores registra crescimento significativo nesta semana...',
                date: '2024-01-13',
                source: 'Economia',
                link: '#'
            },
            {
                title: 'Últimas notícias do dia',
                description: 'Acompanhe os principais acontecimentos nacionais e internacionais...',
                date: '2024-01-12',
                source: 'Notícias',
                link: '#'
            }
        ];

        // Elementos do DOM
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('noResults');

        // Função para buscar em fontes RSS
        async function searchRSS(query) {
            loading.style.display = 'block';
            resultsContainer.innerHTML = '';
            noResults.style.display = 'none';

            try {
                // Simulação de consulta RSS (devido a limitações CORS no navegador)
                // Em produção, use um proxy server ou backend para fetch RSS
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Filtrar resultados mockados baseado na query
                const filteredResults = mockResults.filter(result => 
                    result.title.toLowerCase().includes(query.toLowerCase()) ||
                    result.description.toLowerCase().includes(query.toLowerCase())
                );

                if (filteredResults.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    displayResults(filteredResults);
                }
            } catch (error) {
                console.error('Erro ao buscar RSS:', error);
                noResults.textContent = 'Erro ao buscar resultados';
                noResults.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Função para exibir resultados
        function displayResults(results) {
            results.forEach((result, index) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.style.animationDelay = `${index * 0.1}s`;

                card.innerHTML = `
                    <a href="${result.link}" class="result-title" target="_blank">${result.title}</a>
                    <p class="result-description">${result.description}</p>
                    <div class="result-date">${formatDate(result.date)}</div>
                    <span class="result-source">${result.source}</span>
                `;

                resultsContainer.appendChild(card);
            });
        }

        // Função para formatar data
        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { day: '2-digit', month: 'long', year: 'numeric' };
            return date.toLocaleDateString('pt-BR', options);
        }

        // Função para fazer parse de RSS real (para uso com proxy)
        async function parseRSS(url) {
            try {
                // Em produção, use um proxy como: https://api.rss2json.com/api/v1/feed.json?rss_url=
                const response = await fetch(`https://api.rss2json.com/api/v1/feed.json?rss_url=${encodeURIComponent(url)}`);
                const data = await response.json();
                return data.items || [];
            } catch (error) {
                console.error('Erro ao parsear RSS:', error);
                return [];
            }
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                searchRSS(query);
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    searchRSS(query);
                }
            }
        });

        // Busca em tempo real (opcional)
        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = searchInput.value.trim();
                if (query.length > 2) {
                    searchRSS(query);
                } else if (query.length === 0) {
                    resultsContainer.innerHTML = '';
                    noResults.style.display = 'none';
                }
            }, 500);
        });
    </script>
</body>
</html>
